<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazzel Store</title>
<style>
  body {
    font-family: 'Poppins', Arial, sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #333;
  }
  header {
    background: linear-gradient(90deg, #4CAF50, #43A047);
    color: white;
    padding: 20px 10px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
  }
  nav a:hover {
    color: #ffeb3b;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin: 30px 10px;
  }
  .product {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin: 15px;
    width: 240px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .product:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
  }
  .product img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    margin-bottom: 15px;
  }
  .product h3 {
    margin: 10px 0 5px;
    font-size: 18px;
    color: #4CAF50;
  }
  .product p {
    margin: 5px 0 10px;
    font-weight: bold;
    font-size: 16px;
  }
  .buy-btn, .cart-btn {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    margin: 5px 0;
    width: 100%;
    transition: background 0.3s, transform 0.2s;
  }
  .buy-btn:hover, .cart-btn:hover {
    background: #43A047;
    transform: translateY(-2px);
  }
  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.7);
  }
  .modal-content {
    background: white;
    margin: 10% auto;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }
  .close {
    float: right;
    font-size: 22px;
    cursor: pointer;
    color: #333;
  }
  .account-number {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    text-align: center;
    font-size: 16px;
    margin: 10px 0;
    font-weight: bold;
    background: #f1f1f1;
  }
  .copy-btn {
    background: #2196F3;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 25px;
    cursor: pointer;
    margin-bottom: 10px;
    width: 100%;
    transition: background 0.3s, transform 0.2s;
  }
  .copy-btn:hover {
    background: #0b7dda;
    transform: translateY(-2px);
  }
  /* WhatsApp Button */
  .whatsapp-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    font-size: 32px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s;
  }
  .whatsapp-btn:hover {
    transform: scale(1.1);
  }
  /* Cart */
  .cart {
    position: fixed;
    top: 100px;
    right: 20px;
    background: white;
    border: 2px solid #4CAF50;
    border-radius: 12px;
    padding: 15px;
    width: 280px;
    max-height: 450px;
    overflow-y: auto;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transition: transform 0.3s;
  }
  .cart h3 {
    margin-top: 0;
    text-align: center;
    color: #4CAF50;
  }
  .cart-item {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    font-size: 15px;
  }
  #cart-total {
    font-weight: bold;
    text-align: center;
    margin-top: 10px;
    color: #4CAF50;
  }
  .checkout-btn {
    background: #FF9800;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 25px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
    transition: background 0.3s, transform 0.2s;
  }
  .checkout-btn:hover {
    background: #F57C00;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<header>
  <h1>Dazzel Store</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="https://www.opay.com" target="_blank">Get Started</a>
  </nav>
</header>

<div class="products" id="products"></div>

<!-- Cart -->
<div class="cart" id="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <p id="cart-total"></p>
  <button class="checkout-btn" onclick="checkoutCart()">Checkout</button>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalProductName"></h2>
    <p id="modalProductPrice"></p>
    <p><strong>Pay using one of the accounts below:</strong></p>
    <p>OPay Account Number</p>
    <div class="account-number" id="opayAccount">8029641539</div>
    <button class="copy-btn" onclick="copyText('opayAccount')">Copy OPay</button>
    <p>PalmPay Account Number</p>
    <div class="account-number" id="palmAccount">8029641539</div>
    <button class="copy-btn" onclick="copyText('palmAccount')">Copy PalmPay</button>
    <p style="margin-top:15px">After payment, contact us on WhatsApp to confirm.</p>
  </div>
</div>

<!-- WhatsApp Button -->
<a href="https://wa.me/2348029641539" target="_blank" class="whatsapp-btn">&#x2709;</a>

<script>
  const productList = [
    { name:'Wireless Headphones', price:10000, img:'https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcT9igEuwpgmTMXV_CvlYpA81ob9qyF2FKfgsaGy93Uuhw6dGOgVFhtMeskoXwrkTeTAmR3tQftMwz5KPdDBNiBe_WPQmbF2EzxGhMwUC27QmfwNgiMfnKk5EL0&usqp=CAc' },
    { name:'Smart Watch', price:15000, img:'https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcQ32Of-B2cyKhddyriXwyWYZvU8P_qdTGHlx-3cUxEvAEAtcgSqoC0Wie71l1xlow3EBKrbAs2Vl1WJjVMJIGCoEsVeDGL_nR7sV6o3vPbZizBEqTd5MdGvoA&usqp=CAc' },
    { name:'Bluetooth Speaker', price:12000, img:'https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcQhiPDXIZNZWpdWag8TAz-7ZZh3HwTH1wmv8U4roS46Y2_-tgW9V9CEjfnMaupXebBWJAcHjIrMI5nZ86YsasKKd3OB4P6DA3sNu1bcBBX4IrfjV4JAw4Bg&usqp=CAc' },
    { name:'Laptop Stand', price:9000, img:'https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcQBK-ktdyHN6mfs-OP40j_noPLVEBTvszUTX8PzwqZIlf3CwJrXRYRj4rEwlPslsmZxbGfUUMsagNwmmPDDa9olMnoyhXKAKCpxc9R0-xH8zfBjzTdFkqLpsBC0_DKskctQXs-_CrjILw&usqp=CAc' }
  ];

  const container = document.getElementById('products');
  const cartItemsDiv = document.getElementById('cart-items');
  const cartTotalP = document.getElementById('cart-total');
  let cart = [];

  function updateCart() {
    cartItemsDiv.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `<span>${item.name} (₦${item.price.toLocaleString()})</span> <span>x${item.qty}</span>`;
      cartItemsDiv.appendChild(div);
      total += item.price * item.qty;
    });
    cartTotalP.innerText = `Total: ₦${total.toLocaleString()}`;
  }

  function addToCart(name, price) {
    const existing = cart.find(item => item.name === name);
    if(existing) existing.qty += 1;
    else cart.push({name, price, qty:1});
    updateCart();
  }

  function checkoutCart() {
    let message = 'Hello, I want to order:\n';
    cart.forEach(item => {
      message += `${item.name} x${item.qty} - ₦${(item.price * item.qty).toLocaleString()}\n`;
    });
    const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    message += `Total: ₦${total.toLocaleString()}`;
    window.open(`https://wa.me/2348029641539?text=${encodeURIComponent(message)}`, '_blank');
  }

  productList.forEach(product => {
    const div = document.createElement('div');
    div.className = 'product';
    div.innerHTML = `
      <img src="${product.img}" alt="${product.name}">
      <h3>${product.name}</h3>
      <p>₦${product.price.toLocaleString()}</p>
      <button class="buy-btn" onclick="showModal('${product.name}','₦${product.price.toLocaleString()}')">Buy Now</button>
      <button class="cart-btn" onclick="addToCart('${product.name}', ${product.price})">Add to Cart</button>
    `;
    container.appendChild(div);
  });

  function showModal(name, price) {
    document.getElementById('modalProductName').innerText = name;
    document.getElementById('modalProductPrice').innerText = price;
    document.getElementById('paymentModal').style.display = 'block';
  }

  function closeModal() {
    document.getElementById('paymentModal').style.display = 'none';
  }

  function copyText(id) {
    const sel = document.getElementById(id);
    const range = document.createRange();
    range.selectNode(sel);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert('Account number copied!');
  }

  window.onclick = function(event) {
    if (event.target == document.getElementById('paymentModal')) {
      closeModal();
    }
  }
</script>

</body>
</html>
