<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dazzel Store</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:#0f172a;color:white;}
header{display:flex;justify-content:space-between;padding:20px 40px;background:rgba(0,0,0,0.3);position:sticky;top:0;z-index:10;}
nav a{margin-left:20px;font-weight:bold;cursor:pointer;}
nav a:hover{color:#38bdf8;}
.hero{text-align:center;padding:120px 20px;background:linear-gradient(to right,#1e3a8a,#0f172a);}
.hero h1{font-size:3em;}
.hero p{margin:20px 0;font-size:18px;}
.btn{padding:12px 25px;background:#38bdf8;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
.btn:hover{background:#0ea5e9;}
.products{display:flex;flex-wrap:wrap;justify-content:space-around;padding:60px 20px;}
.product-card{background:#1e293b;border-radius:10px;padding:20px;width:220px;margin:15px;text-align:center;cursor:pointer;}
.product-card img{width:100%;border-radius:10px;margin-bottom:10px;}
.product-price{color:#38bdf8;font-weight:bold;margin-bottom:10px;}
.cart-btn{margin-top:10px;padding:8px 18px;background:#facc15;color:#000;border:none;border-radius:6px;cursor:pointer;margin-right:5px;}
.buy-btn{background:#22c55e;color:white;}
.buy-btn:hover{background:#16a34a;}
.modal{display:none;position:fixed;z-index:100;left:0;top:0;width:100%;height:100%;overflow:auto;background: rgba(0,0,0,0.7);}
.modal-content{background:#1e293b;margin:10% auto;padding:20px;border-radius:10px;width:90%;max-width:400px;text-align:center;}
.close{color:white;float:right;font-size:28px;font-weight:bold;cursor:pointer;}
#modalAccount{width:100%;padding:10px;border-radius:5px;text-align:center;font-weight:bold;background:#fff;color:#000;font-size:16px;margin-bottom:10px;}
.copy-btn{padding:10px 20px;border:none;border-radius:6px;background:#38bdf8;color:white;cursor:pointer;}
.copy-btn:hover{background:#0ea5e9;}
</style>
</head>
<body>

<header>
<h2>Dazzel Store</h2>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>
</header>

<section class="hero">
<h1>Start Your Online Business Today</h1>
<p>Sell products online and reach customers across Nigeria</p>
<button class="btn" onclick="goToShop()">Get Started</button>
</section>

<section class="products" id="products">
</section>

<!-- Product Modal -->
<div id="productModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">&times;</span>
<img id="modalImage" src="" alt="Product">
<h3 id="modalName"></h3>
<p id="modalPrice"></p>
<p>Transfer to this account number:</p>
<input type="text" id="modalAccount" value="8029641539" readonly>
<button class="copy-btn" onclick="copyAccount()">Copy Account Number</button>
<p>After payment, contact us on WhatsApp to confirm</p>
</div>
</div>

<script>
// Products
const products = [
{ name:'Wireless Headphones', price:12500, img:'https://cdn.pixabay.com/photo/2017/06/05/19/21/headphones-2370791_640.jpg' },
{ name:'Smart Watch', price:18000, img:'https://cdn.pixabay.com/photo/2017/08/10/07/51/smartwatch-2616874_640.jpg' },
{ name:'Bluetooth Speaker', price:9500, img:'https://cdn.pixabay.com/photo/2016/11/29/09/32/speaker-1867347_640.jpg' },
{ name:'Portable Charger', price:5500, img:'https://cdn.pixabay.com/photo/2016/11/22/19/36/power-bank-1850992_640.jpg' },
{ name:'Laptop Stand', price:8000, img:'https://cdn.pixabay.com/photo/2016/11/29/04/45/laptop-1869261_640.jpg' }
];

const productContainer = document.getElementById('products');
products.forEach(p=>{
  const div=document.createElement('div');
  div.className='product-card';
  div.innerHTML=`<img src="${p.img}" alt="${p.name}" onclick="openModal('${p.name}',${p.price},'${p.img}')">
  <h4>${p.name}</h4>
  <p class="product-price">₦${p.price.toLocaleString()}</p>
  <button class="cart-btn buy-btn" onclick="event.stopPropagation();buyNow('${p.name}',${p.price},'${p.img}')">Buy Now</button>`;
  productContainer.appendChild(div);
});

// Modal functions
function openModal(name,price,img){
  document.getElementById('modalName').innerText=name;
  document.getElementById('modalPrice').innerText='₦'+price.toLocaleString();
  document.getElementById('modalImage').src=img;
  document.getElementById('productModal').style.display='block';
}
function closeModal(){document.getElementById('productModal').style.display='none';}
function copyAccount(){
  const copyText=document.getElementById('modalAccount');
  copyText.select();
  copyText.setSelectionRange(0,99999);
  document.execCommand('copy');
  alert('Account number copied!');
}
function buyNow(name,price,img){
  openModal(name, price, img);
}
function goToShop(){window.location.href="https://selar.co";}
window.onclick=function(event){
  if(event.target==document.getElementById('productModal')){closeModal();}
}
</script>

</body>
</html>
